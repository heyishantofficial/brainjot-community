# brainjot Community — Docker Compose
# Use this for local testing or Dokploy "Docker Compose" project type.
#
# For Dokploy, you more likely deploy frontend + backend as two separate
# "Application" services pointing to their respective Dockerfiles.
# See DEPLOY_DOKPLOY.md for the step-by-step guide.

services:
  # ── Backend (Node.js/Express API) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainjot-community-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # Required — fill these in or use a .env file at repo root
      MONGODB_URI: ${MONGODB_URI}
      SESSION_SECRET: ${SESSION_SECRET}
      COMMUNITY_JWT_SECRET: ${COMMUNITY_JWT_SECRET}
      MAIN_APP_URL: ${MAIN_APP_URL:-https://app.brainjot.space}
      COMMUNITY_APP_URL: ${COMMUNITY_APP_URL:-https://community.brainjot.space}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://community.brainjot.space}
      MONGO_MAX_POOL: ${MONGO_MAX_POOL:-20}
      # Optional — Redis for horizontal scaling
      REDIS_URL: ${REDIS_URL:-}
      # Optional — Cloudflare R2 uploads
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Vite/React → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_ vars are baked into the JS bundle at build time
        VITE_API_URL: ${VITE_API_URL:-https://api.community.brainjot.space}
        VITE_MAIN_APP_URL: ${VITE_MAIN_APP_URL:-https://app.brainjot.space}
        VITE_MAIN_API_URL: ${VITE_MAIN_API_URL:-}
        # Optional — PostHog analytics stay dark when unset
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-}
    container_name: brainjot-community-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
